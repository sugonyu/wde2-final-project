<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MovieWorld Demo</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
      margin: 0;
      padding: 20px;
    }

    h1 {
      color: #3bb8db;
    }

    .movie-list {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      margin-top: 20px;
    }

    .movie-card {
      width: 250px;
      background: #1b1b1b;
      border: 1px solid #333;
      border-radius: 10px;
      padding: 12px;
    }

    .movie-card img {
      width: 100%;
      height: 300px;
      object-fit: cover;
      border-radius: 6px;
    }

    .movie-card h3 {
      color: #3bb8db;
      margin: 10px 0 6px;
    }

    .movie-card p {
      font-size: 14px;
      line-height: 1.4;
    }

    .movie-card a {
      display: inline-block;
      margin-top: 8px;
      padding: 6px 10px;
      background: #3bb8db;
      color: black;
      text-decoration: none;
      border-radius: 6px;
    }
  </style>
</head>
<body>
  <h1>MovieWorld Demo</h1>
  <p>This page shows the Best Rated Movies from <code>movies-data.js</code>.</p>

  <div id="movieList" class="movie-list"></div>

  <script src="./data/movies-data.js"></script>
  <script src="./scripts/movies-demo-main.js"></script>
</body>
</html>
